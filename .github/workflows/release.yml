name: Build and Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build pandoc mingw-w64 wine64 zip
        pip3 install --user meson

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build and test (native, meson fallback)
      run: |
        meson setup build
        meson compile -C build
        meson test -C build --print-errorlogs

    - name: Cross-compile for Windows
      run: |
        cat > /tmp/cross-mingw64.ini <<'EOF'
        [binaries]
        c = 'x86_64-w64-mingw32-gcc'
        cpp = 'x86_64-w64-mingw32-g++'
        ar = 'x86_64-w64-mingw32-ar'
        strip = 'x86_64-w64-mingw32-strip'
        windres = 'x86_64-w64-mingw32-windres'
        exe_wrapper = 'wine64'
        pkg-config = 'pkg-config'

        [built-in options]
        default_library = 'shared'

        [properties]
        sys_root = '/usr/x86_64-w64-mingw32'

        [host_machine]
        system = 'windows'
        cpu_family = 'x86_64'
        cpu = 'x86_64'
        endian = 'little'
        EOF
        meson setup buildwin --cross-file /tmp/cross-mingw64.ini
        meson compile -C buildwin

    - name: Test Windows build under wine
      run: meson test -C buildwin --print-errorlogs

    - name: Extract version
      id: version
      run: |
        ver=$(meson introspect build --projectinfo | python3 -c 'import sys,json; print(json.load(sys.stdin)["version"])')
        echo "version=${ver}" >> "$GITHUB_OUTPUT"
        echo "project=type-${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

    - name: Create source tarball
      run: |
        # Copy workspace (with submodules), strip .git, resolve symlinks
        cp -a . "/tmp/${{ steps.version.outputs.project }}"
        find "/tmp/${{ steps.version.outputs.project }}" -name '.git' -exec rm -rf {} +
        rm -rf "/tmp/${{ steps.version.outputs.project }}/.github"
        rm -rf "/tmp/${{ steps.version.outputs.project }}/build" "/tmp/${{ steps.version.outputs.project }}/buildwin"
        tar czf "/tmp/${{ steps.version.outputs.project }}.tar.gz" \
          -C /tmp --dereference \
          "${{ steps.version.outputs.project }}"
        cd /tmp && zip -rq "${{ steps.version.outputs.project }}-source.zip" \
          "${{ steps.version.outputs.project }}"

    - name: Package Windows binaries
      run: |
        pkg_dir="type-${{ steps.version.outputs.version }}"
        mkdir -p "/tmp/win/${pkg_dir}"
        cp buildwin/teabase/libtype.dll "/tmp/win/${pkg_dir}/"
        cp buildwin/teabase/pkgIndex.tcl "/tmp/win/${pkg_dir}/"
        cp buildwin/doc/type.html "/tmp/win/${pkg_dir}/type.html"
        cd /tmp/win
        zip -r "/tmp/${{ steps.version.outputs.project }}-windows-x86_64.zip" "${pkg_dir}"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-artifacts
        path: |
          /tmp/${{ steps.version.outputs.project }}.tar.gz
          /tmp/${{ steps.version.outputs.project }}-source.zip
          /tmp/${{ steps.version.outputs.project }}-windows-x86_64.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          /tmp/${{ steps.version.outputs.project }}.tar.gz
          /tmp/${{ steps.version.outputs.project }}-source.zip
          /tmp/${{ steps.version.outputs.project }}-windows-x86_64.zip
